<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">AI</div>
    <h2 class="auth-title" id="authTitle">Welcome Back</h2>
    <p class="auth-subtitle" id="authSubtitle">Sign in to continue to AI Chatbot</p>

    <div class="auth-error" id="authError"></div>

    <form id="authForm" class="auth-form">
      <div class="auth-field" id="nameField">
        <label for="nameInput">Full Name</label>
        <input type="text" id="nameInput" placeholder="Your name" autocomplete="name">
      </div>
      <div class="auth-field">
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="auth-submit-btn" id="authSubmitBtn">Sign In</button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <button id="googleSignInBtn" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <p class="auth-toggle-text">
      <span id="authToggleText">Don't have an account?</span>
      <button id="authToggleBtn" class="auth-toggle-btn" type="button">Sign Up</button>
    </p>
  </div>
</div>

<div class="app-wrapper" id="appWrapper" style="display:none;">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button id="newChatBtn" class="new-chat-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Chat
      </button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">

    <header class="header">
      <div class="header-left">
        <button id="sidebarToggleBtn" class="icon-btn sidebar-toggle-btn" title="Toggle Sidebar" aria-label="Toggle Sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="logo">AI</div>
        <div class="header-text">
          <h1 class="title">AI Chatbot</h1>
          <span class="creator-name">Created by Talha Hussain</span>
          <span class="status"><span class="status-dot"></span>Online</span>
        </div>
      </div>
      <div class="header-right">
        <span class="user-name-display" id="userNameDisplay"></span>
        <button id="logoutBtn" class="icon-btn" title="Logout" aria-label="Logout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
        <button id="clearChatBtn" class="icon-btn" title="Clear Current Chat" aria-label="Clear Current Chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18"/>
            <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <p>Start a conversation</p>
      </div>
    </main>

    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <footer class="input-area">
      <div class="listening-indicator" id="listeningIndicator">
        <span class="listening-dot"></span>
        Listening...
      </div>
      <div class="input-wrapper">
        <textarea id="messageInput" class="message-input" placeholder="Message AI Chatbot..." rows="1" aria-label="Type your message"></textarea>
        <button id="micBtn" class="icon-btn mic-btn" title="Voice Input" aria-label="Voice Input">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button id="sendBtn" class="icon-btn send-btn" title="Send Message" aria-label="Send Message" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </footer>

  </div>

</div>

<script type="module" src="config.js"></script>
<script type="module" src="js/api.js"></script>
<script type="module" src="js/identity.js"></script>
<script type="module" src="js/ui.js"></script>
<script type="module" src="js/voice.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
